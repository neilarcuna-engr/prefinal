<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes Example</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
    <script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
    <script src='https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js'></script>
    <script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>

    <style>
        :root {
            --primary: #4f46e5;
            --bg-body: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding-top: 120px; /* Space para sa floating header */
        }

        /* Fixed Back Button - Consistent sa previous projects */
        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
        }
        .back-btn {
            font-weight: 700;
            color: #64748b;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            transition: 0.3s;
        }
        .back-btn:hover {
            color: var(--primary);
            transform: translateX(-3px);
            background: #fcfdfe;
        }

        /* Professional Navigation Bar */
        .main-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 10px;
            display: inline-flex;
            gap: 5px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }

        .nav-link-custom {
            text-decoration: none;
            color: #64748b;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-link-custom:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        /* Active State Style */
        .active-link {
            background: var(--primary) !important;
            color: white !important;
        }

        /* Page Content Card */
        .content-card {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        h2 { font-weight: 700; color: #1e293b; }
    </style>
</head>
<body>

   

    <div id="root"></div>

    <script type="text/babel">
        const { HashRouter, Switch, Route, NavLink } = ReactRouterDOM;

        function Home() {
            return (
                <div className="content-card">
                    <i className="fa-solid fa-igloo fa-3x text-primary mb-3"></i>
                    <h2>Welcome Home</h2>
                    <p className="text-muted">You are now viewing the main landing page.</p>
                </div>
            );
        }

        function About() {
            return (
                <div className="content-card">
                    <i className="fa-solid fa-circle-info fa-3x text-primary mb-3"></i>
                    <h2>About Us</h2>
                    <p className="text-muted">This is a professional React Router demonstration.</p>
                </div>
            );
        }

        function App() {
            return (
                <HashRouter>
                    <div className="container text-center">
                        <nav className="main-nav">
                            <NavLink 
                                exact 
                                to="/" 
                                className="nav-link-custom" 
                                activeClassName="active-link"
                            >
                                Home
                            </NavLink>
                            <NavLink 
                                to="/about" 
                                className="nav-link-custom" 
                                activeClassName="active-link"
                            >
                                About
                            </NavLink>
                        </nav>

                        <div className="mt-4">
                            <Switch>
                                <Route exact path="/" component={Home} />
                                <Route path="/about" component={About} />
                            </Switch>
                        </div>
                    </div>
                </HashRouter>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
